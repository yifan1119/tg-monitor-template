<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TG 监控 · 登入</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent-red: #2aabee;
    --accent-ember: #64abde;
    --accent-deep: #3390ec;
    --bg-0: #050505;
    --bg-1: #0d0d0d;
    --text: #ffffff;
    --text-dim: #6d7f8f;
    --text-bright: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
    background: var(--bg-0);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    position: relative;
  }

  /* ===== 背景:动态渐层 + 网格 + 扫描线 ===== */
  body::before {
    content: "";
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(51,144,236,0.28), transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(42,171,238,0.22), transparent 55%),
      radial-gradient(circle at 50% 50%, rgba(100,171,222,0.12), transparent 60%),
      linear-gradient(135deg, #050505 0%, #0d0d0d 50%, #050505 100%);
    animation: bgShift 30s ease-in-out infinite;
  }
  body::after {
    content: "";
    position: fixed; inset: 0; z-index: 0;
    background:
      linear-gradient(rgba(42,171,238,0.05) 1px, transparent 1px) 0 0 / 40px 40px,
      linear-gradient(90deg, rgba(42,171,238,0.05) 1px, transparent 1px) 0 0 / 40px 40px;
    mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
    pointer-events: none;
  }
  @keyframes bgShift {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.08); }
  }

  /* 扫描线 */
  .scanline {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: linear-gradient(to bottom, transparent 0%, rgba(42,171,238,0.12) 50%, transparent 100%);
    height: 2px; width: 100%;
    animation: scan 30s linear infinite;
  }
  @keyframes scan {
    0%   { transform: translateY(-10vh); }
    100% { transform: translateY(110vh); }
  }

  /* ===== 登入卡 ===== */
  .login-box {
    position: relative; z-index: 10;
    background: rgba(13, 13, 13, 0.72);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid rgba(42, 171, 238, 0.22);
    border-radius: 18px;
    padding: 48px 40px 40px;
    width: 420px;
    text-align: center;
    box-shadow:
      0 0 60px rgba(42, 171, 238, 0.12),
      0 0 120px rgba(51, 144, 236, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }
  /* 卡片边缘流光 */
  .login-box::before {
    content: "";
    position: absolute; inset: -1px;
    border-radius: 18px;
    padding: 1px;
    background: linear-gradient(135deg,
      rgba(42,171,238,0.6), transparent 30%,
      transparent 70%, rgba(100,171,222,0.6));
    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: borderShine 12s linear infinite;
    pointer-events: none;
  }
  @keyframes borderShine { 0%,100% { opacity: 0.55; } 50% { opacity: 0.8; } }

  /* Logo 圈 */
  .login-icon {
    width: 68px; height: 68px;
    background: linear-gradient(135deg, #2aabee, #3390ec, #64abde);
    background-size: 200% 200%;
    border-radius: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 900;
    font-family: "Orbitron", sans-serif;
    color: #fff;
    margin-bottom: 22px;
    box-shadow: 0 0 30px rgba(42, 171, 238, 0.5), 0 0 60px rgba(51, 144, 236, 0.3);
    animation: iconPulse 6s ease-in-out infinite, gradientMove 18s ease infinite;
  }
  @keyframes iconPulse {
    0%, 100% { transform: scale(1);   box-shadow: 0 0 30px rgba(42,171,238,0.5), 0 0 60px rgba(51,144,236,0.3); }
    50%      { transform: scale(1.06); box-shadow: 0 0 50px rgba(42,171,238,0.8), 0 0 100px rgba(51,144,236,0.5); }
  }
  @keyframes gradientMove {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  /* 标题 — 渐层闪烁 */
  h1 {
    font-family: "Orbitron", sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #2aabee, #3390ec, #64abde, #3390ec, #2aabee);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: textFlow 20s linear infinite;
    text-shadow: 0 0 30px rgba(42, 171, 238, 0.3);
  }
  @keyframes textFlow {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  @keyframes 100%  { opacity: 1; }
    3%        { opacity: 0.85; }
    6%        { opacity: 1; }
    48%       { opacity: 1; }
    50%       { opacity: 0.92; }
    52%       { opacity: 1; }
  }

  .company {
    font-family: "JetBrains Mono", monospace;
    color: var(--accent-red);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-shadow: 0 0 10px rgba(42, 171, 238, 0.5);
  }
  .login-box > p {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 28px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .login-box > p::before { content: "▸ "; color: var(--accent-ember); }

  /* 输入框 */
  .input-wrap { position: relative; margin-bottom: 16px; }
  .login-input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid rgba(42, 171, 238, 0.2);
    background: rgba(5, 5, 5, 0.6);
    color: var(--text-bright);
    font-family: "JetBrains Mono", monospace;
    font-size: 15px;
    letter-spacing: 3px;
    outline: none;
    text-align: center;
    transition: all 0.25s ease;
  }
  .login-input:focus {
    border-color: var(--accent-red);
    box-shadow: 0 0 0 3px rgba(42, 171, 238, 0.15), 0 0 25px rgba(42, 171, 238, 0.25);
    background: rgba(5, 5, 5, 0.85);
  }
  .login-input::placeholder {
    color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; font-size: 12px;
  }

  /* 按钮 */
  .login-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #2aabee 0%, #3390ec 50%, #64abde 100%);
    background-size: 200% 200%;
    color: #fff;
    font-family: "Orbitron", sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(42, 171, 238, 0.35);
  }
  .login-btn:hover {
    background-position: 100% 100%;
    box-shadow: 0 6px 35px rgba(42, 171, 238, 0.55), 0 0 50px rgba(100, 171, 222, 0.35);
    transform: translateY(-1px);
  }
  .login-btn:active { transform: translateY(0); }
  .login-btn::after {
    content: "";
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    transition: left 0.6s ease;
  }
  .login-btn:hover::after { left: 100%; }

  /* 错误 */
  .error {
    margin-top: 16px;
    padding: 10px 14px;
    border-radius: 8px;
    background: rgba(42, 171, 238, 0.1);
    border: 1px solid rgba(42, 171, 238, 0.3);
    color: #ff6b6b;
    font-size: 12px;
    letter-spacing: 1px;
    animation: errorShake 0.4s ease;
  }
  .error::before { content: "⚠ "; }
  @keyframes errorShake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-4px); }
    75%      { transform: translateX(4px); }
  }

  /* Footer — 系统状态条 */
  .sys-status {
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px dashed rgba(42, 171, 238, 0.12);
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .sys-status .led {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4fae4f;
    box-shadow: 0 0 8px #4fae4f;
    margin-right: 6px;
    animation: ledBlink 3.5s ease-in-out infinite;
  }
  @keyframes ledBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.75; } }
</style>
</head>
<body>
<div class="scanline"></div>
<form class="login-box" method="POST">
  <div class="login-icon">TG</div>
  <h1>TG MONITOR</h1>
  {% if company %}<div class="company">{{ company }}</div>{% endif %}
  <p>请输入账号密码登入</p>
  <div class="input-wrap">
    <input class="login-input" type="text" name="username"
           placeholder="账号" autofocus autocomplete="username">
  </div>
  <div class="input-wrap">
    <input class="login-input" type="password" name="password"
           placeholder="密码" autocomplete="current-password">
  </div>
  <button class="login-btn" type="submit">▸ 登入系统</button>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  {% if reset_msg %}
  <div class="error" style="color:#4fae4f;background:rgba(79,174,79,0.1);border-color:rgba(79,174,79,0.3);">{{ reset_msg }}</div>
  {% endif %}
  <div style="margin-top:14px;text-align:right;">
    <a href="#" id="forgot-link" style="font-size:11px;color:var(--accent-red);letter-spacing:1.5px;text-decoration:none;text-transform:uppercase;">忘记密码？</a>
  </div>
  <div class="sys-status">
    <span><span class="led"></span>系统在线</span>
    <span>v2.6.12 · 加密连线</span>
  </div>
</form>

<!-- 忘记密码 Modal -->
<div id="forgot-modal" style="display:none;position:fixed;inset:0;z-index:100;
     background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);
     align-items:center;justify-content:center;">
  <div style="position:relative;width:420px;max-width:92vw;
              background:rgba(13,13,13,0.92);border:1px solid rgba(42,171,238,0.3);
              border-radius:14px;padding:32px 32px 28px;
              box-shadow:0 0 60px rgba(42,171,238,0.2);
              font-family:'JetBrains Mono',monospace;color:#fff;">
    <button id="forgot-close" type="button"
            style="position:absolute;top:10px;right:14px;background:none;border:none;
                   color:#6d7f8f;font-size:22px;cursor:pointer;">×</button>
    <div style="font-family:'Orbitron',sans-serif;font-size:16px;letter-spacing:2px;
                color:#2aabee;margin-bottom:4px;">RESET PASSWORD</div>
    <div style="font-size:11px;color:#6d7f8f;letter-spacing:1.5px;margin-bottom:22px;text-transform:uppercase;">▸ 通过 TG 私信接收验证码</div>

    <!-- Step 1 -->
    <div id="forgot-step1">
      <input id="forgot-username" type="text" placeholder="账号" autocomplete="username"
             style="width:100%;padding:13px 14px;border-radius:10px;
                    border:1px solid rgba(42,171,238,0.2);background:rgba(5,5,5,0.6);
                    color:#fff;font-family:inherit;font-size:14px;letter-spacing:2px;
                    outline:none;text-align:center;margin-bottom:12px;">
      <button id="forgot-send" type="button" class="login-btn" style="margin-top:4px;">▸ 发送验证码</button>
    </div>

    <!-- Step 2 -->
    <div id="forgot-step2" style="display:none;">
      <div style="font-size:11px;color:#64abde;margin-bottom:12px;letter-spacing:1px;">
        已通过 TG 私信发送 6 位验证码(5 分钟有效)
      </div>
      <input id="forgot-code" type="text" placeholder="6 位验证码" maxlength="6"
             style="width:100%;padding:13px 14px;border-radius:10px;
                    border:1px solid rgba(42,171,238,0.2);background:rgba(5,5,5,0.6);
                    color:#fff;font-family:inherit;font-size:15px;letter-spacing:6px;
                    outline:none;text-align:center;margin-bottom:10px;">
      <input id="forgot-newpwd" type="password" placeholder="新密码 (≥8 位)"
             style="width:100%;padding:13px 14px;border-radius:10px;
                    border:1px solid rgba(42,171,238,0.2);background:rgba(5,5,5,0.6);
                    color:#fff;font-family:inherit;font-size:14px;letter-spacing:2px;
                    outline:none;text-align:center;margin-bottom:10px;">
      <input id="forgot-newpwd2" type="password" placeholder="确认新密码"
             style="width:100%;padding:13px 14px;border-radius:10px;
                    border:1px solid rgba(42,171,238,0.2);background:rgba(5,5,5,0.6);
                    color:#fff;font-family:inherit;font-size:14px;letter-spacing:2px;
                    outline:none;text-align:center;margin-bottom:14px;">
      <button id="forgot-submit" type="button" class="login-btn">▸ 重置密码</button>
    </div>

    <div id="forgot-msg" style="margin-top:14px;font-size:12px;text-align:center;
                                 min-height:18px;letter-spacing:1px;"></div>
  </div>
</div>

<script>
(function(){
  const modal = document.getElementById('forgot-modal');
  const link = document.getElementById('forgot-link');
  const closeBtn = document.getElementById('forgot-close');
  const step1 = document.getElementById('forgot-step1');
  const step2 = document.getElementById('forgot-step2');
  const msgEl = document.getElementById('forgot-msg');
  const unameInput = document.getElementById('forgot-username');
  const sendBtn = document.getElementById('forgot-send');
  const submitBtn = document.getElementById('forgot-submit');
  let currentUser = '';

  function setMsg(text, ok){
    msgEl.textContent = text || '';
    msgEl.style.color = ok ? '#4fae4f' : '#ff6b6b';
  }
  function open(){
    modal.style.display = 'flex';
    step1.style.display = 'block';
    step2.style.display = 'none';
    unameInput.value = '';
    document.getElementById('forgot-code').value = '';
    document.getElementById('forgot-newpwd').value = '';
    document.getElementById('forgot-newpwd2').value = '';
    setMsg('', true);
    setTimeout(()=>unameInput.focus(), 100);
  }
  function close(){ modal.style.display='none'; }

  link.addEventListener('click', (e)=>{ e.preventDefault(); open(); });
  closeBtn.addEventListener('click', close);
  modal.addEventListener('click', (e)=>{ if (e.target === modal) close(); });

  sendBtn.addEventListener('click', async ()=>{
    const u = unameInput.value.trim();
    if (!u) { setMsg('请输入账号', false); return; }
    sendBtn.disabled = true;
    setMsg('发送中...', true);
    try {
      const r = await fetch('/api/auth/forgot_password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: u}),
      });
      const j = await r.json();
      if (j.ok) {
        currentUser = u;
        step1.style.display = 'none';
        step2.style.display = 'block';
        setMsg('验证码已发送,请查看 TG 私信', true);
        setTimeout(()=>document.getElementById('forgot-code').focus(), 100);
      } else {
        setMsg(j.error || '发送失败', false);
      }
    } catch(e) {
      setMsg('网络错误', false);
    } finally {
      sendBtn.disabled = false;
    }
  });

  submitBtn.addEventListener('click', async ()=>{
    const code = document.getElementById('forgot-code').value.trim();
    const p1 = document.getElementById('forgot-newpwd').value;
    const p2 = document.getElementById('forgot-newpwd2').value;
    if (!code || code.length !== 6) { setMsg('验证码必须 6 位', false); return; }
    if (p1.length < 8) { setMsg('新密码至少 8 位', false); return; }
    if (p1 !== p2) { setMsg('两次密码不一致', false); return; }
    submitBtn.disabled = true;
    setMsg('提交中...', true);
    try {
      const r = await fetch('/api/auth/reset_password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: currentUser, code: code, new_password: p1}),
      });
      const j = await r.json();
      if (j.ok) {
        setMsg('✅ 密码已重置,正在跳转登入...', true);
        setTimeout(()=>{ window.location.href = '/login?reset=1'; }, 1200);
      } else {
        setMsg(j.error || '重置失败', false);
      }
    } catch(e) {
      setMsg('网络错误', false);
    } finally {
      submitBtn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
