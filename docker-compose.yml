services:
  tg-monitor:
    build: .
    container_name: tg-monitor-${COMPANY_NAME:-default}
    restart: unless-stopped
    # 启动前把 host 代码同步到 /app,git pull 后 restart 即生效
    # (避免 Docker 镜像里的旧 COPY 跟 host 不同步导致诡异 bug)
    command: sh -c "cp -rf /app/repo/*.py /app/ 2>/dev/null; python main.py"
    volumes:
      - ./sessions:/app/sessions
      - ./data:/app/data
      - ./.env:/app/.env
      - .:/app/repo:ro
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build: .
    container_name: tg-web-${COMPANY_NAME:-default}
    restart: unless-stopped
    # 启动前把 host 代码同步到 /app,git pull + restart 即生效(不用 rebuild)
    command: sh -c "cp -rf /app/repo/*.py /app/repo/templates /app/ 2>/dev/null; python web.py"
    ports:
      - "${WEB_PORT:-5001}:5001"
    volumes:
      - ./sessions:/app/sessions
      - ./data:/app/data
      - ./.env:/app/.env
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app/repo:ro   # host 代码挂这,启动时 sync 到 /app
    working_dir: /app
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - WEB_PORT=${WEB_PORT:-5001}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5001/login", "-o", "/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Caddy 反代 — 给 Web 套上 HTTPS,自动从 Let's Encrypt 拿证书
  # 仅在 .env 配了 PUBLIC_DOMAIN 时才需要(给 OAuth 用)
  # 启动:docker compose -p tg-demo --profile https up -d caddy
  caddy:
    image: caddy:2-alpine
    container_name: tg-caddy-${COMPANY_NAME:-default}
    restart: unless-stopped
    profiles: ["https"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - TZ=Asia/Shanghai
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-}
      - WEB_PORT=${WEB_PORT:-5001}

volumes:
  caddy_data:
  caddy_config:
