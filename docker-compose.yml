services:
  tg-monitor:
    build: .
    container_name: tg-monitor-${COMPANY_NAME:-default}
    restart: unless-stopped
    volumes:
      - ./sessions:/app/sessions
      - ./data:/app/data
      - ./.env:/app/.env
      - ./service-account.json:/app/service-account.json
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build: .
    container_name: tg-web-${COMPANY_NAME:-default}
    restart: unless-stopped
    command: python web.py
    ports:
      - "${WEB_PORT:-5001}:5001"
    volumes:
      - ./sessions:/app/sessions
      - ./data:/app/data
      - ./.env:/app/.env
      - ./service-account.json:/app/service-account.json
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app/repo:ro   # 让 web 容器能调 docker compose 启动 tg-monitor
    working_dir: /app
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - WEB_PORT=${WEB_PORT:-5001}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5001/login", "-o", "/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Caddy 反代 — 给 Web 套上 HTTPS,自动从 Let's Encrypt 拿证书
  # 仅在 .env 配了 PUBLIC_DOMAIN 时才需要(给 OAuth 用)
  # 启动:docker compose -p tg-demo --profile https up -d caddy
  caddy:
    image: caddy:2-alpine
    container_name: tg-caddy-${COMPANY_NAME:-default}
    restart: unless-stopped
    profiles: ["https"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - TZ=Asia/Shanghai
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-}
      - WEB_PORT=${WEB_PORT:-5001}

volumes:
  caddy_data:
  caddy_config:
