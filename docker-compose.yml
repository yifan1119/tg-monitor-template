services:
  tg-monitor:
    build: .
    container_name: tg-monitor-${COMPANY_NAME:-default}
    restart: unless-stopped
    # 启动前把 host 代码同步到 /app,git pull 后 restart 即生效
    # (避免 Docker 镜像里的旧 COPY 跟 host 不同步导致诡异 bug)
    # v3.0.8.1 (CLAUDE.md 硬规定 #8): 显式 cp 列表 — 把所有 host 改动文件都同步,
    # 防止只 cp .py 漏掉 README/release_notes 导致 update_checker 推老文案。
    # Codex P1 修: cp 失败不再静默 (改 echo CP_*_FAIL 到 docker logs), 操作员能立刻
    # 在日志看到具体哪个文件 cp 错了。容器仍照常启动 (不阻塞), 让镜像 fallback 兜底。
    command: sh -c "cp -rf /app/repo/*.py /app/ || echo CP_PY_FAIL; cp -rf /app/repo/release_notes.json /app/release_notes.json || echo CP_NOTES_FAIL; cp -rf /app/repo/README.md /app/README.md || echo CP_README_FAIL; python main.py"
    volumes:
      - ./sessions:/app/sessions
      - ./data:/app/data
      - ./.env:/app/.env
      - .:/app/repo:rw
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build: .
    container_name: tg-web-${COMPANY_NAME:-default}
    restart: unless-stopped
    # 启动前把 host 代码同步到 /app,git pull + restart 即生效(不用 rebuild)
    # v3.0.8.1 真坑根治:
    #   原 `cp -rf /app/repo/templates /app/` 是「目录复制」, 镜像里 /app/templates
    #   已存在 → cp 把整个 templates 复制成嵌套 /app/templates/templates/dashboard.html,
    #   Flask 还是读 /app/templates/dashboard.html (镜像旧版) → 升级后客户看不到新按钮。
    #   现在改成 *.html 文件级 glob,确保新 templates 直接覆盖目录里的文件,不嵌套。
    #   同时 cp README + release_notes 给 _app_version_string + 升级通知用。
    # Codex P1 修: cp 失败不再静默 (改 echo CP_*_FAIL 到 docker logs), 操作员能立刻
    # 在日志看到具体哪个文件 cp 错了。容器仍照常启动 (不阻塞), 让镜像 fallback 兜底,
    # 避免 host bind mount 短暂 race 时容器无法启动。
    command: sh -c "cp -rf /app/repo/*.py /app/ || echo CP_PY_FAIL; cp -rf /app/repo/templates/*.html /app/templates/ || echo CP_TEMPLATES_FAIL; cp -rf /app/repo/README.md /app/README.md || echo CP_README_FAIL; cp -rf /app/repo/release_notes.json /app/release_notes.json || echo CP_NOTES_FAIL; python web.py"
    ports:
      - "${WEB_PORT:-5001}:5001"
    volumes:
      - ./sessions:/app/sessions
      - ./data:/app/data
      - ./.env:/app/.env
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app/repo:rw   # host 代码挂这,启动时 sync 到 /app
    working_dir: /app
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - WEB_PORT=${WEB_PORT:-5001}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5001/login", "-o", "/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Caddy 反代 — 给 Web 套上 HTTPS,自动从 Let's Encrypt 拿证书
  # 仅在 .env 配了 PUBLIC_DOMAIN 时才需要(给 OAuth 用)
  # 启动:docker compose -p tg-demo --profile https up -d caddy
  caddy:
    image: caddy:2-alpine
    container_name: tg-caddy-${COMPANY_NAME:-default}
    restart: unless-stopped
    profiles: ["https"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - TZ=Asia/Shanghai
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-}
      - WEB_PORT=${WEB_PORT:-5001}

volumes:
  caddy_data:
  caddy_config:
