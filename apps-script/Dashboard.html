<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <base target="_top">
  <title>TG 监控看板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #050505;
      --bg-surface: rgba(13, 17, 23, 0.85);
      --bg-card: rgba(5, 5, 5, 0.5);
      --accent: #2aabee;
      --accent-soft: rgba(42, 171, 238, 0.15);
      --accent-red: #e53935;
      --text: #e8eaed;
      --text-dim: #8c9aa6;
      --border: rgba(42, 171, 238, 0.12);
      --border-hover: rgba(42, 171, 238, 0.3);
      --good: #3dcf7c;
      --warn: #f4b942;
      --bad: #e74c3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      background-image:
        radial-gradient(circle at 20% 10%, rgba(42, 171, 238, 0.06), transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(229, 57, 53, 0.04), transparent 40%);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-red);
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 .dot {
      width: 10px; height: 10px;
      background: var(--good);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--good);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .header .meta { color: var(--text-dim); font-size: 13px; }
    .header .meta b { color: var(--accent); }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .kpi {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 12px;
      padding: 18px;
      transition: all 0.3s ease;
    }
    .kpi:hover { border-color: var(--border-hover); box-shadow: 0 4px 25px rgba(42, 171, 238, 0.08); }
    .kpi.bad { border-left-color: var(--bad); }
    .kpi.warn { border-left-color: var(--warn); }
    .kpi.good { border-left-color: var(--good); }
    .kpi .label { color: var(--text-dim); font-size: 12px; margin-bottom: 8px; }
    .kpi .num { color: var(--text); font-size: 28px; font-weight: 700; line-height: 1; }
    .kpi .num.muted { color: var(--accent); }
    .kpi .unit { color: var(--text-dim); font-size: 12px; margin-left: 4px; }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--bg-card);
      backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-red);
      border-radius: 12px;
      padding: 18px;
      overflow: hidden;
    }
    .card-title {
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::before {
      content: "▸";
      color: var(--accent-red);
    }
    .card canvas { max-height: 260px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    th {
      color: var(--text-dim);
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td { color: var(--text); }
    td.num { text-align: right; color: var(--accent); font-variant-numeric: tabular-nums; }

    .bar-row {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 0;
      font-size: 13px;
    }
    .bar-row .name { color: var(--text); min-width: 60px; font-weight: 500; }
    .bar-row .bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .bar-row .bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-red)); border-radius: 3px; }
    .bar-row .count { color: var(--accent); font-variant-numeric: tabular-nums; min-width: 30px; text-align: right; }

    .alert-list { list-style: none; }
    .alert-list li {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
      line-height: 1.5;
    }
    .alert-list li:last-child { border-bottom: none; }
    .alert-list .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      margin-right: 8px;
    }
    .alert-list .tag.no_reply { background: rgba(244, 185, 66, 0.2); color: var(--warn); }
    .alert-list .tag.keyword { background: rgba(42, 171, 238, 0.2); color: var(--accent); }
    .alert-list .tag.deleted { background: rgba(231, 76, 60, 0.2); color: var(--bad); }
    .alert-list .time { color: var(--text-dim); font-size: 11px; }
    .alert-list .meta { color: var(--text-dim); font-size: 12px; margin-top: 2px; }
    .alert-list .text { color: var(--text); margin-top: 4px; word-break: break-all; }

    .empty { color: var(--text-dim); font-size: 13px; text-align: center; padding: 30px 0; }

    /* Heatmap */
    .heatmap { display: grid; grid-template-columns: repeat(24, 1fr); gap: 3px; }
    .heatmap .cell {
      aspect-ratio: 1;
      background: rgba(42, 171, 238, 0.08);
      border-radius: 3px;
      position: relative;
    }
    .heatmap .cell[data-lv="0"] { background: rgba(255,255,255,0.03); }
    .heatmap .cell[data-lv="1"] { background: rgba(42, 171, 238, 0.15); }
    .heatmap .cell[data-lv="2"] { background: rgba(42, 171, 238, 0.35); }
    .heatmap .cell[data-lv="3"] { background: rgba(42, 171, 238, 0.6); }
    .heatmap .cell[data-lv="4"] { background: var(--accent); box-shadow: 0 0 8px var(--accent-soft); }
    .heatmap-labels { display: grid; grid-template-columns: repeat(24, 1fr); gap: 3px; font-size: 10px; color: var(--text-dim); margin-top: 6px; text-align: center; }

    .footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      margin-top: 20px;
      padding: 14px;
    }

    @media (max-width: 900px) {
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .grid, .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="dot"></span> TG 监控看板 · <span id="dept">--</span></h1>
    <div class="meta">
      <span>账号数 <b id="account-count">-</b></span>
      &nbsp;|&nbsp;
      <span>更新于 <b id="updated-at">--</b></span>
    </div>
  </div>

  <div class="kpi-row" id="kpis">
    <div class="kpi bad">
      <div class="label">今日未回复预警</div>
      <div class="num" id="k-noreply">-</div>
    </div>
    <div class="kpi warn">
      <div class="label">今日关键词命中</div>
      <div class="num" id="k-keyword">-</div>
    </div>
    <div class="kpi bad">
      <div class="label">今日消息被删</div>
      <div class="num" id="k-deleted">-</div>
    </div>
    <div class="kpi good">
      <div class="label">今日活跃对话</div>
      <div class="num" id="k-conv">-</div>
    </div>
    <div class="kpi">
      <div class="label">今日平均回复</div>
      <div class="num muted"><span id="k-resp">-</span><span class="unit">分</span></div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-title">近 7 天趋势</div>
      <canvas id="chart-trend"></canvas>
    </div>
    <div class="card">
      <div class="card-title">关键词命中 Top 10</div>
      <div id="keyword-list"></div>
    </div>
  </div>

  <div class="grid-3">
    <div class="card">
      <div class="card-title">24 小时消息热力</div>
      <div class="heatmap" id="heatmap"></div>
      <div class="heatmap-labels" id="heatmap-labels"></div>
    </div>
    <div class="card">
      <div class="card-title">商务人员预警排行</div>
      <div id="operator-list"></div>
    </div>
    <div class="card">
      <div class="card-title">慢响应 Top 10</div>
      <div id="slow-list"></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <div class="card-title">最新 10 条告警</div>
    <ul class="alert-list" id="alert-list"></ul>
  </div>

  <div class="footer">30 秒自动刷新 · TG 监控看板 · 数据源: 本 Google Sheet</div>

  <script>
    let trendChart = null;

    function render(d) {
      document.getElementById('dept').textContent = d.company || d.spreadsheetName || '--';
      document.getElementById('account-count').textContent = d.accountCount;
      document.getElementById('updated-at').textContent = d.generatedAt;

      document.getElementById('k-noreply').textContent = d.kpis.todayNoReply;
      document.getElementById('k-keyword').textContent = d.kpis.todayKeyword;
      document.getElementById('k-deleted').textContent = d.kpis.todayDeleted;
      document.getElementById('k-conv').textContent = d.kpis.todayConversations;
      document.getElementById('k-resp').textContent = d.kpis.avgResponseMin;

      // Trend chart
      const ctx = document.getElementById('chart-trend').getContext('2d');
      if (trendChart) trendChart.destroy();
      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: d.trend7d.labels,
          datasets: [
            { label: '未回复', data: d.trend7d.noReply, borderColor: '#f4b942', backgroundColor: 'rgba(244,185,66,0.15)', fill: true, tension: 0.35 },
            { label: '关键词', data: d.trend7d.keyword, borderColor: '#2aabee', backgroundColor: 'rgba(42,171,238,0.15)', fill: true, tension: 0.35 },
            { label: '删除', data: d.trend7d.deleted, borderColor: '#e74c3c', backgroundColor: 'rgba(231,76,60,0.15)', fill: true, tension: 0.35 },
          ],
        },
        options: {
          plugins: { legend: { labels: { color: '#8c9aa6', font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: '#8c9aa6' }, grid: { color: 'rgba(255,255,255,0.04)' } },
            y: { ticks: { color: '#8c9aa6', precision: 0 }, grid: { color: 'rgba(255,255,255,0.04)' }, beginAtZero: true },
          },
          maintainAspectRatio: false,
        },
      });

      // Keyword list
      renderBarList('keyword-list', d.keywordTop, 'keyword');

      // Heatmap
      const hm = document.getElementById('heatmap');
      const hmLabels = document.getElementById('heatmap-labels');
      hm.innerHTML = '';
      hmLabels.innerHTML = '';
      const max = Math.max.apply(null, d.hourHeatmap) || 1;
      for (let h = 0; h < 24; h++) {
        const v = d.hourHeatmap[h];
        const lv = v === 0 ? 0 : Math.min(4, Math.ceil(v / max * 4));
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.lv = lv;
        cell.title = h + ':00 — ' + v + ' 条';
        hm.appendChild(cell);

        const lbl = document.createElement('div');
        lbl.textContent = (h % 3 === 0) ? h : '';
        hmLabels.appendChild(lbl);
      }

      // Operator
      const opList = document.getElementById('operator-list');
      opList.innerHTML = '';
      if (!d.operatorStats.length) { opList.innerHTML = '<div class="empty">暂无数据</div>'; }
      else {
        const tbl = document.createElement('table');
        tbl.innerHTML = '<thead><tr><th>商务</th><th>未回</th><th>关键词</th><th>删除</th></tr></thead>';
        const tb = document.createElement('tbody');
        d.operatorStats.forEach(function (o) {
          const tr = document.createElement('tr');
          tr.innerHTML = '<td>' + escape(o.operator) + '</td><td class="num">' + o.noReply + '</td><td class="num">' + o.keyword + '</td><td class="num">' + o.deleted + '</td>';
          tb.appendChild(tr);
        });
        tbl.appendChild(tb);
        opList.appendChild(tbl);
      }

      // Slow responders
      const slowList = document.getElementById('slow-list');
      slowList.innerHTML = '';
      if (!d.slowResponders.length) { slowList.innerHTML = '<div class="empty">暂无数据</div>'; }
      else {
        const tbl = document.createElement('table');
        tbl.innerHTML = '<thead><tr><th>对话</th><th>平均</th><th>最长</th></tr></thead>';
        const tb = document.createElement('tbody');
        d.slowResponders.forEach(function (s) {
          const tr = document.createElement('tr');
          tr.innerHTML = '<td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escape(s.peer) + '<div style="color:#8c9aa6;font-size:11px">' + escape(s.account) + '</div></td><td class="num">' + s.avg + '分</td><td class="num">' + s.max + '分</td>';
          tb.appendChild(tr);
        });
        tbl.appendChild(tb);
        slowList.appendChild(tbl);
      }

      // Recent alerts
      const alertList = document.getElementById('alert-list');
      alertList.innerHTML = '';
      if (!d.recentAlerts.length) { alertList.innerHTML = '<li><div class="empty">暂无告警</div></li>'; }
      else {
        d.recentAlerts.forEach(function (a) {
          const tagText = a.type === 'no_reply' ? '未回复' : (a.type === 'keyword' ? '关键词' : '删除');
          const li = document.createElement('li');
          li.innerHTML =
            '<span class="tag ' + a.type + '">' + tagText + '</span>' +
            '<span class="time">' + a.time + '</span>' +
            '<div class="meta">' + escape(a.account) + ' ← ' + escape(a.peer) + '</div>' +
            '<div class="text">' + escape(a.text) + '</div>';
          alertList.appendChild(li);
        });
      }
    }

    function renderBarList(id, arr, field) {
      const el = document.getElementById(id);
      el.innerHTML = '';
      if (!arr.length) { el.innerHTML = '<div class="empty">暂无数据</div>'; return; }
      const max = arr[0].count || 1;
      arr.forEach(function (item) {
        const row = document.createElement('div');
        row.className = 'bar-row';
        row.innerHTML =
          '<span class="name">' + escape(item[field]) + '</span>' +
          '<div class="bar-wrap"><div class="bar" style="width:' + (item.count / max * 100) + '%"></div></div>' +
          '<span class="count">' + item.count + '</span>';
        el.appendChild(row);
      });
    }

    function escape(s) {
      return String(s || '').replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    function refresh() {
      google.script.run
        .withSuccessHandler(render)
        .withFailureHandler(function (err) {
          console.error(err);
          document.getElementById('updated-at').textContent = '(刷新失败,见 Console)';
        })
        .getDashboardData();
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
